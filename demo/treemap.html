<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Folder Size Treemap</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1e1e1e; color: #ccc; font-family: -apple-system, sans-serif; }
    h1 { padding: 16px 20px 8px; font-size: 14px; color: #00ff88; letter-spacing: 0.05em; text-transform: uppercase; }
    #chart { width: 100vw; height: calc(100vh - 48px); }
    .node rect { stroke: #1e1e1e; stroke-width: 2px; }
    .node text { fill: #fff; font-size: 11px; pointer-events: none; }
    .node:hover rect { filter: brightness(1.3); }
    .breadcrumb { padding: 0 20px 8px; font-size: 12px; color: #858585; }
    .breadcrumb span { cursor: pointer; color: #00ff88; }
    .breadcrumb span:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Folder Size Treemap</h1>
  <div class="breadcrumb" id="breadcrumb"></div>
  <div id="chart"></div>

  <script>
    const data = {
      name: "splice",
      children: [
        { name: "src-tauri", children: [
          { name: "src", children: [
            { name: "terminal", size: 84000 },
            { name: "commands", size: 52000 },
            { name: "workspace", size: 18000 },
            { name: "lsp", size: 22000 },
            { name: "attention", size: 8000 },
          ]},
          { name: "target (release)", size: 420000 },
          { name: "Cargo.toml", size: 2000 },
        ]},
        { name: "src", children: [
          { name: "components", children: [
            { name: "panes", size: 68000 },
            { name: "terminal", size: 44000 },
            { name: "sidebar", size: 31000 },
            { name: "topbar", size: 14000 },
            { name: "shared", size: 9000 },
          ]},
          { name: "lib", children: [
            { name: "stores", size: 48000 },
            { name: "theme", size: 36000 },
            { name: "terminal", size: 28000 },
            { name: "ipc", size: 12000 },
            { name: "lsp", size: 8000 },
            { name: "utils", size: 6000 },
          ]},
        ]},
        { name: "node_modules", size: 280000 },
        { name: "dist", size: 62000 },
        { name: "docs", size: 18000 },
      ]
    };

    const palette = [
      "#00ff88","#61afef","#c678dd","#e5c07b","#56b6c2",
      "#e06c75","#98c379","#d19a66","#abb2bf","#528bff"
    ];

    const width = window.innerWidth;
    const height = window.innerHeight - 48;

    const svg = d3.select("#chart")
      .append("svg")
      .attr("width", width)
      .attr("height", height);

    let currentRoot;
    const colorMap = new Map();
    let colorIdx = 0;

    function getColor(name) {
      if (!colorMap.has(name)) colorMap.set(name, palette[colorIdx++ % palette.length]);
      return colorMap.get(name);
    }

    function render(nodeData) {
      svg.selectAll("*").remove();

      const root = d3.hierarchy(nodeData)
        .sum(d => d.size || 0)
        .sort((a, b) => b.value - a.value);

      d3.treemap()
        .size([width, height])
        .paddingOuter(4)
        .paddingTop(20)
        .paddingInner(2)
        .round(true)(root);

      const node = svg.selectAll("g")
        .data(root.leaves())
        .join("g")
        .attr("class", "node")
        .attr("transform", d => `translate(${d.x0},${d.y0})`);

      node.append("rect")
        .attr("width", d => d.x1 - d.x0)
        .attr("height", d => d.y1 - d.y0)
        .attr("fill", d => {
          let ancestor = d;
          while (ancestor.depth > 1) ancestor = ancestor.parent;
          return getColor(ancestor.data.name);
        })
        .attr("opacity", d => 0.5 + (d.depth / 8))
        .style("cursor", d => d.children ? "pointer" : "default");

      node.append("text")
        .attr("x", 4)
        .attr("y", 13)
        .text(d => {
          const w = d.x1 - d.x0;
          if (w < 30) return "";
          return d.data.name;
        });

      node.append("text")
        .attr("x", 4)
        .attr("y", 26)
        .attr("opacity", 0.6)
        .text(d => {
          const w = d.x1 - d.x0;
          if (w < 60) return "";
          return formatSize(d.value);
        });

      // Draw parent labels
      const parents = svg.selectAll("g.parent")
        .data(root.descendants().filter(d => d.depth && d.children))
        .join("g")
        .attr("class", "parent")
        .attr("transform", d => `translate(${d.x0},${d.y0})`);

      parents.append("text")
        .attr("x", 4)
        .attr("y", 14)
        .attr("fill", "#fff")
        .attr("font-size", 11)
        .attr("font-weight", "bold")
        .attr("pointer-events", "none")
        .text(d => d.x1 - d.x0 > 40 ? d.data.name : "");

      updateBreadcrumb(nodeData);
    }

    function formatSize(bytes) {
      if (bytes > 1000000) return (bytes / 1000000).toFixed(1) + " MB";
      if (bytes > 1000) return (bytes / 1000).toFixed(0) + " KB";
      return bytes + " B";
    }

    function updateBreadcrumb(node) {
      const crumb = document.getElementById("breadcrumb");
      crumb.innerHTML = `<span onclick="render(data)">splice</span>${node === data ? "" : " / " + node.name}`;
    }

    render(data);
  </script>
</body>
</html>
